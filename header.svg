<svg width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      <![CDATA[
        @keyframes gradientShift {
          0% { stop-color: #4CAF50; }
          50% { stop-color: #2196F3; }
          100% { stop-color: #4CAF50; }
        }
        @keyframes float {
          0% { transform: translateY(0px); }
          50% { transform: translateY(-10px); }
          100% { transform: translateY(0px); }
        }
        .title {
          font-family: Arial, sans-serif;
          font-size: 40px;
          font-weight: bold;
          fill: white;
          text-anchor: middle;
          animation: float 3s ease-in-out infinite;
        }
        .subtitle {
          font-family: Arial, sans-serif;
          font-size: 18px;
          fill: rgba(255,255,255,0.9);
          text-anchor: middle;
        }
        .badge {
          font-family: Arial, sans-serif;
          font-size: 14px;
          fill: white;
        }
        .badge-bg {
          rx: 15;
          ry: 15;
          filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
      ]]>
    </style>
    
    <!-- Gradient dengan animasi -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50; stop-opacity:1">
        <animate attributeName="stop-color" values="#4CAF50;#2196F3;#4CAF50" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" style="stop-color:#2196F3; stop-opacity:1">
        <animate attributeName="stop-color" values="#2196F3;#4CAF50;#2196F3" dur="5s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>

  <!-- Background dengan gradient -->
  <rect width="800" height="300" fill="url(#grad1)" rx="20" ry="20"/>
  
  <!-- Konten menggunakan foreignObject untuk HTML styling -->
  <foreignObject x="0" y="0" width="800" height="300">
    <div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: white; font-family: Arial, sans-serif;">
      <h1 style="margin:0; font-size:48px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); animation: float 3s ease-in-out infinite;">⚡ KSTW SMP ⚡</h1>
      <p style="font-size:20px; margin:10px 0; opacity:0.9;">Server Minecraft Bedrock/Java (Beta)</p>
      
      <!-- Status badges -->
      <div style="display: flex; gap: 15px; margin-top: 20px;">
        <span style="background: rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 30px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.3);">
          🟢 Online
        </span>
        <span style="background: rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 30px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.3);">
          👥 0/100 Players
        </span>
      </div>
      
      <!-- Server IP dengan efek -->
      <div style="margin-top: 25px; background: rgba(0,0,0,0.3); padding: 10px 30px; border-radius: 50px; font-family: monospace; font-size: 18px; border: 1px solid rgba(255,255,255,0.2);">
        play.kstw.smp.com
      </div>
    </div>
  </foreignObject>
</svg>
