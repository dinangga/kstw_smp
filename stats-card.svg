<svg width="400" height="200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes progressFill {
      from { width: 0%; }
      to { width: var(--width); }
    }
    .progress-bar {
      height: 10px;
      background: #4CAF50;
      border-radius: 5px;
      animation: progressFill 1.5s ease-out forwards;
    }
    .card {
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
    }
  </style>
  
  <foreignObject width="400" height="200">
    <div xmlns="http://www.w3.org/1999/xhtml" style="background: white; border-radius: 15px; padding: 20px; font-family: Arial;">
      <h3 style="margin:0 0 15px 0; color:#333;">Server Statistics</h3>
      
      <div style="margin-bottom: 15px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
          <span>CPU Usage</span>
          <span>12%</span>
        </div>
        <div style="background: #eee; border-radius: 5px;">
          <div class="progress-bar" style="width: 15%;"></div>
        </div>
      </div>
      
      <div style="margin-bottom: 15px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
          <span>Memory</span>
          <span>2.1GB / 12GB</span>
        </div>
        <div style="background: #eee; border-radius: 5px;">
          <div class="progress-bar" style="width: 26%; background: #2196F3;"></div>
        </div>
      </div>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
        <div style="text-align: center; padding: 10px; background: #f5f5f5; border-radius: 8px;">
          <div style="font-size: 24px; font-weight: bold; color: #4CAF50;">12</div>
          <div style="font-size: 12px; color: #666;">Online Players</div>
        </div>
        <div style="text-align: center; padding: 10px; background: #f5f5f5; border-radius: 8px;">
          <div style="font-size: 24px; font-weight: bold; color: #2196F3;">24/7</div>
          <div style="font-size: 12px; color: #666; margin-bottom: 15px;">Uptime</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
